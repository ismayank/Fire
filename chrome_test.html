<!DOCTYPE html>
<html>
<head>
    <title>Chrome Video Test</title>
    <style>
        video {
            border: 2px solid #ccc;
            margin: 10px;
        }
        .info {
            background: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Chrome Video Compatibility Test</h1>
    
    <div class="info">
        <strong>Browser:</strong> <span id="browser"></span><br>
        <strong>User Agent:</strong> <span id="ua"></span>
    </div>
    
    <h2>Processed Video (New H.264 Codec)</h2>
    <video id="processedVideo" controls width="600" height="400">
        <source src="/video/processed_car-fire-2.mp4" type="video/mp4; codecs=avc1.42E01E">
        <source src="/video/processed_car-fire-2.mp4" type="video/mp4; codecs=avc1.58A01E">
        <source src="/video/processed_car-fire-2.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <h2>Original Video (For Comparison)</h2>
    <video controls width="600" height="400">
        <source src="/preloaded/car-fire-2.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <h2>Debug Information</h2>
    <div id="debug"></div>
    
    <script>
        // Browser detection
        const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
        document.getElementById('browser').textContent = isChrome ? 'Chrome' : 'Other';
        document.getElementById('ua').textContent = navigator.userAgent;
        
        // Test processed video
        const processedVideo = document.getElementById('processedVideo');
        const debug = document.getElementById('debug');
        
        processedVideo.addEventListener('loadstart', () => {
            debug.innerHTML += '<p>✅ Processed video: Load start</p>';
        });
        
        processedVideo.addEventListener('loadedmetadata', () => {
            debug.innerHTML += '<p>✅ Processed video: Metadata loaded</p>';
        });
        
        processedVideo.addEventListener('loadeddata', () => {
            debug.innerHTML += '<p>✅ Processed video: Data loaded</p>';
        });
        
        processedVideo.addEventListener('canplay', () => {
            debug.innerHTML += '<p>✅ Processed video: Can play</p>';
        });
        
        processedVideo.addEventListener('error', (e) => {
            debug.innerHTML += '<p>❌ Processed video: Error - ' + (processedVideo.error ? processedVideo.error.message : 'Unknown') + '</p>';
        });
        
        // Test fetch for headers
        fetch('/video/processed_car-fire-2.mp4')
            .then(response => {
                debug.innerHTML += '<p>📡 Fetch: ' + response.status + ' ' + response.statusText + '</p>';
                debug.innerHTML += '<p>📡 Content-Type: ' + response.headers.get('Content-Type') + '</p>';
                debug.innerHTML += '<p>📡 Accept-Ranges: ' + response.headers.get('Accept-Ranges') + '</p>';
                debug.innerHTML += '<p>📡 Content-Length: ' + response.headers.get('Content-Length') + '</p>';
            })
            .catch(error => {
                debug.innerHTML += '<p>❌ Fetch error: ' + error.message + '</p>';
            });
    </script>
</body>
</html>
