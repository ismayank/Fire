<!DOCTYPE html>
<html>
<head>
    <title>Video Debug</title>
</head>
<body>
    <h1>Video Debug Test</h1>
    
    <h2>Direct Video Test</h2>
    <video controls width="600" height="400">
        <source src="/video/processed_car-fire.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <h2>Original Video Test</h2>
    <video controls width="600" height="400">
        <source src="/preloaded/car-fire.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <h2>Debug Info</h2>
    <div id="debug"></div>
    
    <script>
        // Test video loading
        const video = document.querySelector('video');
        const debug = document.getElementById('debug');
        
        video.addEventListener('loadstart', () => {
            debug.innerHTML += '<p>Load start</p>';
        });
        
        video.addEventListener('loadeddata', () => {
            debug.innerHTML += '<p>Loaded data</p>';
        });
        
        video.addEventListener('canplay', () => {
            debug.innerHTML += '<p>Can play</p>';
        });
        
        video.addEventListener('error', (e) => {
            debug.innerHTML += '<p>Error: ' + video.error.message + '</p>';
        });
        
        // Test fetch
        fetch('/video/processed_car-fire.mp4')
            .then(response => {
                debug.innerHTML += '<p>Fetch response: ' + response.status + ' ' + response.statusText + '</p>';
                debug.innerHTML += '<p>Content-Type: ' + response.headers.get('Content-Type') + '</p>';
                debug.innerHTML += '<p>Content-Length: ' + response.headers.get('Content-Length') + '</p>';
            })
            .catch(error => {
                debug.innerHTML += '<p>Fetch error: ' + error.message + '</p>';
            });
    </script>
</body>
</html>
